name: security

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches new gitleaks detection rules
    # against historical commits (defense-in-depth vs pre-commit primary).
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.30.1"
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Scan git history
        run: gitleaks git --config .gitleaks.toml --redact --verbose --exit-code 1 .
      - name: Scan working tree
        run: gitleaks dir --config .gitleaks.toml --redact --verbose --exit-code 1 .
